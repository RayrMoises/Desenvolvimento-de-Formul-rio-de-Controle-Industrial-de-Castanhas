<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Controle de Produção</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=2.0.0">

</head>

<body>

    <!-- TOPO -->

    <header class="topbar">

        <button id="openPanelBtn" class="menu-btn">
            ☰ Informações
        </button>

        <div class="title-area">
            <h1>Quebra Mecânica</h1>
            <span>Controle de Produção</span>
        </div>

    </header>

    <!-- PAINEL LATERAL -->

    <aside id="infoPanel" class="side-panel">

        <div class="panel-header">

            <h2>Painel de Produção</h2>

            <button id="closePanelBtn" class="close-btn">
                ✕
            </button>

        </div>

        <div class="panel-switch">

            <button id="btnDisponivel" class="panel-btn active-panel">
                Disponíveis
            </button>

            <button id="btnAndamento" class="panel-btn">
                Em Andamento
            </button>

        </div>

        <div id="conteudoPainel">

            <div class="card-processo">
                <h4>M014</h4>
                <p>Sub-lote 1</p>
                <strong>1500 kg</strong>
            </div>

            <div class="card-processo">
                <h4>M014</h4>
                <p>Sub-lote 2</p>
                <strong>2300 kg</strong>
            </div>

        </div>

    </aside>

    <!-- OVERLAY -->

    <div id="overlay"></div>

    <!-- CONTEÚDO -->

    <main class="main-content">

        <form id="quebraForm">

            <!-- DADOS GERAIS -->

            <section class="form-card">

                <h2 class="section-title">
                    Dados Gerais
                </h2>

                <div class="form-grid">

                    <div class="field">
                        <label>Responsável</label>
                        <input type="text">
                    </div>

                    <div class="field">
                        <label>Nº do Lote</label>
                        <input type="text">
                    </div>

                    <div class="field">
                        <label>Nº do Sub-lote</label>
                        <input type="number">
                    </div>

                    <div class="field">
                        <label>Data</label>
                        <input type="date">
                    </div>

                    <div class="field">
                        <label>Hora Início</label>
                        <input type="time">
                    </div>

                    <div class="field">
                        <label>Inicio Pós Pausa</label>
                        <input type="time">
                    </div>

                    <div class="field">
                        <label>Hora Final</label>
                        <input type="time">
                    </div>

                </div>

            </section>

            <!-- PRODUÇÃO -->

            <section class="form-card">

                <h2 class="section-title">
                    Produção
                </h2>

                <div class="form-grid">

                    <div class="field">
                        <label>Peso Castanha Dry Quebrada</label>
                        <input type="number">
                    </div>

                    <div class="field field-full">

                        <label>Tamanho</label>

                        <div class="size-buttons">

                            <button type="button" class="size-btn">
                                PEQUENA PP
                            </button>

                            <button type="button" class="size-btn">
                                PEQUENA
                            </button>

                            <button type="button" class="size-btn">
                                MÉDIA
                            </button>

                            <button type="button" class="size-btn">
                                GRAÚDA
                            </button>

                        </div>

                    </div>

                    <div class="field">
                        <label>Peso Inteira</label>
                        <input type="number">
                    </div>

                    <div class="field">
                        <label>Peso Quebrada</label>
                        <input type="number">
                    </div>

                    <div class="field">
                        <label>Peso Ferida</label>
                        <input type="number">
                    </div>

                    <div class="field">
                        <label>Peso Podre</label>
                        <input type="number">
                    </div>

                    <div class="field">
                        <label>Peso Amarela</label>
                        <input type="number">
                    </div>

                </div>

            </section>

            <!-- AVALIAÇÕES -->

            <section class="form-card">

                <h2 class="section-title">
                    Avaliações
                </h2>

                <div class="field">

                    <label>
                        Avaliação Visual da Castanha
                    </label>

                    <div class="rating stars" data-rating="0">

                        <span>★</span>
                        <span>★</span>
                        <span>★</span>
                        <span>★</span>
                        <span>★</span>

                    </div>

                </div>

                <div class="field">

                    <label>
                        Avaliação de Produtividade da Equipe
                    </label>

                    <div class="rating hearts" data-rating="0">

                        <span>❤</span>
                        <span>❤</span>
                        <span>❤</span>
                        <span>❤</span>
                        <span>❤</span>

                    </div>

                </div>

            </section>

            <!-- OBSERVAÇÕES -->

            <section class="form-card">

                <h2 class="section-title">
                    Observações
                </h2>

                <textarea rows="6"></textarea>

            </section>

            <button type="submit" class="btn-save">
                Salvar Registro
            </button>

        </form>

    </main>

    <script src="app.js"></script>

</body>

</html>
