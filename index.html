<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Controle de Produção</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">

    <button
        class="btn btn-success menu-btn"
        data-bs-toggle="offcanvas"
        data-bs-target="#infoPanel">
        ☰ Informações
    </button>

    <div class="title-area">
        <h1>Quebra Mecânica</h1>
        <span>Controle de Produção</span>
    </div>

</header>

<!-- Painel lateral -->

<div class="offcanvas offcanvas-start" tabindex="-1" id="infoPanel">

    <div class="offcanvas-header">
        <h5>Painel de Produção</h5>

        <button
            type="button"
            class="btn-close"
            data-bs-dismiss="offcanvas">
        </button>
    </div>

    <div class="offcanvas-body">

        <div class="panel-switch">

            <button id="btnDisponivel" class="panel-btn active-panel">
                Disponíveis
            </button>

            <button id="btnAndamento" class="panel-btn">
                Em Andamento
            </button>

        </div>

        <div id="conteudoPainel">

            <div class="card-processo">
                <h6>M014</h6>
                <p>Sub-lote 1</p>
                <strong>1500 kg</strong>
            </div>

            <div class="card-processo">
                <h6>M014</h6>
                <p>Sub-lote 2</p>
                <strong>2300 kg</strong>
            </div>

            <div class="card-processo">
                <h6>M015</h6>
                <p>Sub-lote 1</p>
                <strong>1800 kg</strong>
            </div>

        </div>

    </div>

</div>

<main class="container py-4">

<form id="quebraForm">

    <div class="card form-card">

        <div class="card-body">

            <h4 class="section-title">
                Dados Gerais
            </h4>

            <div class="row g-3">

                <div class="col-md-6">
                    <label>Responsável</label>
                    <input type="text" class="form-control">
                </div>

                <div class="col-md-3">
                    <label>Nº do Lote</label>
                    <input type="text" class="form-control">
                </div>

                <div class="col-md-3">
                    <label>Nº do Sub-lote</label>
                    <input type="number" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Data</label>
                    <input type="date" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Hora Início</label>
                    <input type="time" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Hora Final</label>
                    <input type="time" class="form-control">
                </div>

            </div>

        </div>

    </div>

    <div class="card form-card">

        <div class="card-body">

            <h4 class="section-title">
                Produção
            </h4>

            <div class="row g-3">

                <div class="col-md-6">
                    <label>Peso Castanha Dry Quebrada</label>
                    <input type="number" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Tamanho</label>

                    <div class="size-buttons">

                        <button type="button" class="size-btn">
                            PEQUENA PP
                        </button>

                        <button type="button" class="size-btn">
                            PEQUENA
                        </button>

                        <button type="button" class="size-btn">
                            MÉDIA
                        </button>

                        <button type="button" class="size-btn">
                            GRAÚDA
                        </button>

                    </div>

                </div>

                <div class="col-md-6">
                    <label>Peso Inteira</label>
                    <input type="number" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Peso Quebrada</label>
                    <input type="number" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Peso Ferida</label>
                    <input type="number" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Peso Podre</label>
                    <input type="number" class="form-control">
                </div>

                <div class="col-md-6">
                    <label>Peso Amarela</label>
                    <input type="number" class="form-control">
                </div>

            </div>

        </div>

    </div>

    <div class="card form-card">

        <div class="card-body">

            <h4 class="section-title">
                Avaliações
            </h4>

            <label>Avaliação Visual</label>

            <div class="rating stars" data-rating="0">

                <span>★</span>
                <span>★</span>
                <span>★</span>
                <span>★</span>
                <span>★</span>

            </div>

            <label class="mt-4">
                Produtividade da Equipe
            </label>

            <div class="rating hearts" data-rating="0">

                <span>❤</span>
                <span>❤</span>
                <span>❤</span>
                <span>❤</span>
                <span>❤</span>

            </div>

        </div>

    </div>

    <div class="card form-card">

        <div class="card-body">

            <label>Observações</label>

            <textarea
                rows="5"
                class="form-control">
            </textarea>

        </div>

    </div>

    <button class="btn-save">
        Salvar Registro
    </button>

</form>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
